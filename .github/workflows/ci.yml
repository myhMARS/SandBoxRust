name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libseccomp-dev

      - name: Build server
        run: cargo build --release -p sandbox-server

      - name: Test (unit)
        run: cargo test -p sandbox-server

      - name: Lint
        run: cargo clippy -p sandbox-server -- -D warnings

      - name: Build seccomp (python3)
        run: cargo build --release -p sandbox_seccomp --features python3

      - name: Build seccomp (nodejs)
        run: cargo build --release -p sandbox_seccomp --features nodejs

  docker-test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t sandbox-server:ci .

      - name: Start container
        run: |
          docker run -d --name sandbox-ci -p 8194:8194 sandbox-server:ci
          # Wait for health check to pass
          echo "Waiting for sandbox to be ready..."
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8194/health > /dev/null 2>&1; then
              echo "Sandbox ready (attempt $i)"
              break
            fi
            sleep 2
          done
          # Verify health
          curl -sf http://127.0.0.1:8194/health | python3 -m json.tool

      - name: Smoke test
        run: |
          # Python execution
          PY_CODE=$(echo -n 'print(1+2)' | base64 -w0)
          RESP=$(curl -sf -X POST http://127.0.0.1:8194/v1/sandbox/run \
            -H "Content-Type: application/json" \
            -H "X-Api-Key: sandbox" \
            -d "{\"language\":\"python3\",\"code\":\"$PY_CODE\"}")
          echo "$RESP" | python3 -c "
          import sys,json; d=json.load(sys.stdin)
          assert d['code']==0, f'code={d[\"code\"]}'
          assert d['data']['stdout'].strip()=='3', f'stdout={d[\"data\"][\"stdout\"]}'
          print('Python smoke test: OK')
          "

          # Node.js execution
          JS_CODE=$(echo -n 'console.log("ok")' | base64 -w0)
          RESP=$(curl -sf -X POST http://127.0.0.1:8194/v1/sandbox/run \
            -H "Content-Type: application/json" \
            -H "X-Api-Key: sandbox" \
            -d "{\"language\":\"javascript\",\"code\":\"$JS_CODE\"}")
          echo "$RESP" | python3 -c "
          import sys,json; d=json.load(sys.stdin)
          assert d['code']==0, f'code={d[\"code\"]}'
          assert d['data']['stdout'].strip()=='ok', f'stdout={d[\"data\"][\"stdout\"]}'
          print('Node.js smoke test: OK')
          "

      - name: Stress test
        run: python3 tests/stress_test.py -n 30 -c 5

      - name: Container logs (on failure)
        if: failure()
        run: docker logs sandbox-ci

      - name: Cleanup
        if: always()
        run: docker rm -f sandbox-ci
