name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libseccomp-dev

      - name: Build server
        run: cargo build --release -p redbear-sandbox

      - name: Test (unit)
        run: cargo test -p redbear-sandbox

      - name: Lint
        run: cargo clippy -p redbear-sandbox -- -D warnings

      - name: Build seccomp (python3)
        run: cargo build --release -p seccomp_redbear --features python3

      - name: Build seccomp (nodejs)
        run: cargo build --release -p seccomp_redbear --features nodejs

  integration:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libseccomp-dev python3 nodejs npm

      - name: Build server
        run: cargo build --release -p redbear-sandbox

      - name: Build seccomp (python3)
        run: cargo build --release -p seccomp_redbear --features python3

      - name: Build seccomp (nodejs)
        run: cargo build --release -p seccomp_redbear --features nodejs

      - name: Setup seccomp libs
        run: |
          mkdir -p /usr/local/share/sandbox/tmp
          chmod 1777 /usr/local/share/sandbox/tmp
          cp target/release/libsandbox.so /usr/local/share/sandbox/libpython.so
          cp target/release/libsandbox.so /usr/local/share/sandbox/libnodejs.so
          npm install --prefix /usr/local/share/sandbox koffi

      - name: Run integration tests
        run: bash tests/integration.sh
