[app]
port = 8194
debug = false
key = "redbear-sandbox"

max_workers = 4
worker_timeout = 30

enable_network = true
enable_preload = false

# Pre-warmed Python zygote — fork() child per request, avoids interpreter
# cold start. Linux-only; set to false on macOS/Windows dev machines.
python_zygote = true

python_path = "/usr/local/bin/python3"
nodejs_path = "/usr/bin/node"

sandbox_user = "sandbox"
sandbox_uid = 65537
sandbox_gid = 0

[proxy]
socks5 = ""
http = ""
https = ""
